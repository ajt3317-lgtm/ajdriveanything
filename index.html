<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drive Anything</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff;
    overflow: hidden;
  }
  #game-wrap { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; background: #2a3a2a; }
  #hud {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0, 0, 0, 0.65);
    padding: 12px 16px; border-radius: 10px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    min-width: 200px;
  }
  #hud .row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 14px; }
  #hud .label { color: #aaa; }
  #hud .value { font-weight: 600; color: var(--accent, #ffd84a); }
  #status {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0, 0, 0, 0.65);
    padding: 12px 16px; border-radius: 10px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    max-width: 260px; font-size: 14px;
  }
  #status .title { font-weight: 700; color: var(--accent, #ffd84a); margin-bottom: 6px; }
  #status .desc { color: #ccc; font-size: 13px; line-height: 1.4; }
  #help {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(0, 0, 0, 0.55);
    padding: 8px 12px; border-radius: 8px;
    font-size: 12px; color: #ccc;
  }
  #help kbd {
    background: #333; border: 1px solid #555;
    border-radius: 4px; padding: 1px 6px;
    font-family: monospace; color: #fff;
  }
  #overlay {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; z-index: 10; padding: 24px;
    overflow-y: auto;
  }
  #overlay h1 {
    font-size: 56px; margin: 0 0 6px;
    background: linear-gradient(120deg, #ffd84a, #f472b6, #5fb8ff);
    -webkit-background-clip: text; background-clip: text;
    color: transparent; letter-spacing: -0.02em; font-weight: 800;
  }
  #overlay p { margin: 4px 0; max-width: 540px; text-align: center; color: #ddd; font-size: 15px; }
  .modes {
    display: flex; gap: 16px; margin-top: 24px;
    flex-wrap: wrap; justify-content: center;
  }
  .mode-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 16px; padding: 20px;
    width: 240px;
    transition: transform 0.15s, background 0.15s, border-color 0.15s;
    font-family: inherit; color: #fff; text-align: center;
    display: flex; flex-direction: column;
  }
  .mode-card:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--mc-color, #ffd84a);
    transform: translateY(-4px);
  }
  .mode-card .emoji { font-size: 48px; display: block; margin-bottom: 4px; }
  .mode-card h2 { font-size: 20px; margin: 4px 0 6px; color: var(--mc-color, #ffd84a); font-weight: 700; }
  .mode-card p { font-size: 12px; margin: 0 0 10px; color: #bbb; line-height: 1.45; }
  .color-row {
    display: flex; gap: 6px; justify-content: center;
    margin: 10px 0; flex-wrap: wrap;
  }
  .swatch {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.25);
    cursor: pointer; padding: 0;
    transition: transform 0.1s, border-color 0.1s;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.selected {
    border-color: var(--mc-color, #ffd84a);
    transform: scale(1.15);
    box-shadow: 0 0 8px var(--mc-color, #ffd84a);
  }
  .drive-btn {
    margin-top: 8px;
    padding: 10px 16px;
    background: var(--mc-color, #ffd84a);
    color: #1a1a1a;
    border: none; border-radius: 6px;
    font-weight: 700; cursor: pointer;
    font-family: inherit; font-size: 14px;
    transition: filter 0.15s;
  }
  .drive-btn:hover { filter: brightness(1.1); }
  .end-buttons { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; justify-content: center; }
  .end-buttons button {
    padding: 12px 26px; font-size: 15px; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: inherit;
  }
  .btn-primary { background: #ffd84a; color: #1a1a1a; }
  .btn-primary:hover { background: #ffe57a; }
  .btn-secondary { background: #333; color: #fff; border: 1px solid #555 !important; }
  .btn-secondary:hover { background: #444; }
  .hidden { display: none !important; }
  #message {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.85);
    color: var(--accent, #ffd84a);
    padding: 16px 32px; border-radius: 10px;
    font-size: 22px; font-weight: 700;
    pointer-events: none; opacity: 0;
    transition: opacity 0.3s; z-index: 5;
  }
  #message.show { opacity: 1; }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="row"><span class="label" id="earnLabel">Earnings</span><span class="value" id="money">$0</span></div>
    <div class="row"><span class="label" id="fareLabel">Fares</span><span class="value" id="fares">0</span></div>
    <div class="row"><span class="label">Time</span><span class="value" id="time">2:00</span></div>
    <div class="row" id="livesRow" style="display:none;"><span class="label">Lives</span><span class="value" id="lives">&#10084;&#10084;&#10084;</span></div>
    <div class="row"><span class="label">Speed</span><span class="value" id="speed">0</span></div>
  </div>

  <div id="status">
    <div class="title" id="statusTitle">Select a vehicle</div>
    <div class="desc" id="statusDesc">Pick a mode to start driving.</div>
  </div>

  <div id="help">
    <kbd>W</kbd>/<kbd>&uarr;</kbd> forward &nbsp;
    <kbd>S</kbd>/<kbd>&darr;</kbd> reverse &nbsp;
    <kbd>A</kbd><kbd>D</kbd>/<kbd>&larr;</kbd><kbd>&rarr;</kbd> steer &nbsp;
    <kbd>Space</kbd> brake
  </div>

  <div id="message"></div>

  <div id="overlay"></div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W = window.innerWidth, H = window.innerHeight;
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W; canvas.height = H;
  }
  window.addEventListener('resize', resize);
  resize();

  // ============ MODE CONFIG ============
  const MODES = {
    taxi: {
      title: 'Taxi Driver',
      emoji: '&#128658;',
      blurb: 'Pick up passengers across a city grid and deliver them to their destinations. Faster drop-offs earn bigger tips.',
      accent: '#ffd84a',
      bgClear: '#2a4a2a',
      earnLabel: 'Earnings', fareLabel: 'Fares', earnPrefix: '$',
      duration: 120, hasLives: false, lives: 0, hasHazards: false,
      speedSuffix: ' mph', speedMul: 12,
      statusInitial: { t: 'Looking for a fare', d: 'Drive to the cyan marker to pick someone up.' },
      gameOver: {
        good: 'Stellar shift! The dispatcher will be pleased.',
        mid: 'Not bad. Some passengers still need a ride home.',
        bad: 'Rough day on the streets. Try again?'
      },
      pickupRadius: 28, stopSpeed: 0.6,
    },
    ant: {
      title: 'Ant Forager',
      emoji: '&#128028;',
      blurb: 'Crawl around a giant house, haul crumbs and snacks back to your anthill, and dodge stomping human feet.',
      accent: '#d28a5a',
      bgClear: '#1a1410',
      earnLabel: 'Food', fareLabel: 'Deliveries', earnPrefix: '',
      duration: 120, hasLives: true, lives: 3, hasHazards: true,
      speedSuffix: '', speedMul: 60,
      statusInitial: { t: 'The colony needs food', d: 'Crawl to the cyan marker to grab some food.' },
      gameOver: {
        good: 'A feast for the colony! The queen is pleased.',
        mid: 'Decent forage. The anthill survives another day.',
        bad: 'Slim pickings. Watch the sky next time...'
      },
      pickupRadius: 18, stopSpeed: 0.5,
    },
    plane: {
      title: 'Plane Pilot',
      emoji: '&#9992;',
      blurb: 'Fly passengers between airports across an ocean map. Throttle down to land — you cannot fully stop in the air.',
      accent: '#5fb8ff',
      bgClear: '#7da9c8',
      earnLabel: 'Earnings', fareLabel: 'Flights', earnPrefix: '$',
      duration: 180, hasLives: false, lives: 0, hasHazards: false,
      speedSuffix: ' kts', speedMul: 32,
      statusInitial: { t: 'Cleared for taxi', d: 'A passenger needs a flight to another airport.' },
      gameOver: {
        good: 'Smooth flying, captain. Tower says well done.',
        mid: 'Decent shift. A few delays, but you made it.',
        bad: 'Choppy shift. The tower wants a word with you.'
      },
      pickupRadius: 70, stopSpeed: 2.4,
    },
    ship: {
      title: 'Supply Ship',
      emoji: '&#9973;',
      blurb: 'Navigate the ocean delivering supplies to ports. Watch out for roaming mines and bombs in the water.',
      accent: '#ff6b5a',
      bgClear: '#4a7a9e',
      earnLabel: 'Supplies', fareLabel: 'Deliveries', earnPrefix: '',
      duration: 150, hasLives: true, lives: 3, hasHazards: true,
      speedSuffix: ' kt', speedMul: 28,
      statusInitial: { t: 'Port is awaiting cargo', d: 'Navigate to the cyan marker to pick up supplies.' },
      gameOver: {
        good: 'Mission accomplished! Command is satisfied.',
        mid: 'Supplies delivered. Command is content.',
        bad: 'You made it, but barely. Command is disappointed.'
      },
      pickupRadius: 60, stopSpeed: 1.8,
    }
  };

  // ============ CUSTOMIZATION ============
  const COLOR_PALETTE = {
    taxi:  ['#ffd84a', '#ff5a5a', '#5aff5a', '#5a8aff', '#d05aff', '#ffffff', '#222222'],
    ant:   ['#3a1808', '#cc1810', '#0a48a0', '#0a6010', '#6a0a6a', '#ff8800', '#888888'],
    plane: ['#ffffff', '#ff5a5a', '#5fb8ff', '#ffd84a', '#5aff5a', '#d05aff', '#222222'],
    ship:  ['#5a8aff', '#ff5a5a', '#5aff5a', '#ffd84a', '#ffffff', '#ff8844', '#444444'],
  };

  let customization = (() => {
    try {
      const saved = JSON.parse(localStorage.getItem('driveAnythingColors'));
      if (saved && saved.taxi && saved.ant && saved.plane && saved.ship) return saved;
    } catch (e) {}
    return {
      taxi: COLOR_PALETTE.taxi[0],
      ant: COLOR_PALETTE.ant[0],
      plane: COLOR_PALETTE.plane[0],
      ship: COLOR_PALETTE.ship[0],
    };
  })();
  function saveCustomization() {
    try { localStorage.setItem('driveAnythingColors', JSON.stringify(customization)); } catch (e) {}
  }
  function darken(hex, factor) {
    const h = hex.replace('#','');
    const full = h.length === 3 ? h.split('').map(c=>c+c).join('') : h;
    const r = Math.floor(parseInt(full.slice(0,2),16) * factor);
    const g = Math.floor(parseInt(full.slice(2,4),16) * factor);
    const b = Math.floor(parseInt(full.slice(4,6),16) * factor);
    return `rgb(${r},${g},${b})`;
  }

  // ============ STATE ============
  let mode = null, world = null, player = null;
  let money = 0, fares = 0, lives = 0, timeLeft = 0;
  let running = false, passenger = null;
  let hazards = [], hazardTimer = 0, shake = 0, invuln = 0;
  const cam = { x: 0, y: 0 };
  const keys = {};

  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if ([' ', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(e.key.toLowerCase())) e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // ============ CITY WORLD ============
  function buildCityWorld() {
    const TILE = 120, COLS = 14, ROWS = 14, ROAD_W = 50;
    const WORLD_W = COLS * TILE, WORLD_H = ROWS * TILE;
    function isOnRoad(x, y) {
      const mx = ((x % TILE) + TILE) % TILE;
      const my = ((y % TILE) + TILE) % TILE;
      return mx < ROAD_W || mx > TILE - ROAD_W || my < ROAD_W || my > TILE - ROAD_W;
    }
    const buildings = [];
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r < ROWS; r++) {
        const seed = (c * 928371 + r * 1827) % 1000;
        const px = c * TILE + ROAD_W, py = r * TILE + ROAD_W;
        const pw = TILE - 2 * ROAD_W, ph = TILE - 2 * ROAD_W;
        let segs;
        const cnt = 2 + (seed % 3);
        if (cnt === 2) segs = [{x:0,y:0,w:pw/2-2,h:ph},{x:pw/2+2,y:0,w:pw/2-2,h:ph}];
        else if (cnt === 3) segs = [{x:0,y:0,w:pw,h:ph/2-2},{x:0,y:ph/2+2,w:pw/2-2,h:ph/2-2},{x:pw/2+2,y:ph/2+2,w:pw/2-2,h:ph/2-2}];
        else segs = [{x:0,y:0,w:pw/2-2,h:ph/2-2},{x:pw/2+2,y:0,w:pw/2-2,h:ph/2-2},{x:0,y:ph/2+2,w:pw/2-2,h:ph/2-2},{x:pw/2+2,y:ph/2+2,w:pw/2-2,h:ph/2-2}];
        for (let i = 0; i < segs.length; i++) {
          const s = segs[i];
          const hue = ((seed * 7 + i * 53) % 360);
          buildings.push({
            x: px + s.x, y: py + s.y, w: s.w, h: s.h,
            color: `hsl(${hue}, 12%, ${28 + ((seed + i) % 18)}%)`,
            roof: `hsl(${hue}, 20%, ${42 + ((seed * 3 + i) % 16)}%)`
          });
        }
      }
    }
    const decos = [];
    for (let i = 0; i < 220; i++) {
      const c = Math.floor(Math.random() * COLS), r = Math.floor(Math.random() * ROWS);
      const px = c * TILE + ROAD_W, py = r * TILE + ROAD_W;
      const corner = Math.floor(Math.random() * 4); const off = 4;
      let x, y;
      if (corner === 0) { x = px - off; y = py - off; }
      else if (corner === 1) { x = px + (TILE - 2 * ROAD_W) + off; y = py - off; }
      else if (corner === 2) { x = px - off; y = py + (TILE - 2 * ROAD_W) + off; }
      else { x = px + (TILE - 2 * ROAD_W) + off; y = py + (TILE - 2 * ROAD_W) + off; }
      decos.push({ x, y, kind: Math.random() < 0.7 ? 'tree' : 'hydrant' });
    }
    function randomSidewalk() {
      for (let t = 0; t < 200; t++) {
        const c = 1 + Math.floor(Math.random() * (COLS - 2));
        const r = 1 + Math.floor(Math.random() * (ROWS - 2));
        const side = Math.floor(Math.random() * 4);
        const bx = c * TILE + ROAD_W, by = r * TILE + ROAD_W;
        const bw = TILE - 2*ROAD_W, bh = TILE - 2*ROAD_W;
        let x, y; const m = 14;
        if (side === 0) { x = bx + Math.random()*bw; y = by - m; }
        else if (side === 1) { x = bx + Math.random()*bw; y = by + bh + m; }
        else if (side === 2) { x = bx - m; y = by + Math.random()*bh; }
        else { x = bx + bw + m; y = by + Math.random()*bh; }
        if (x > 50 && y > 50 && x < WORLD_W-50 && y < WORLD_H-50) return {x,y};
      }
      return {x: WORLD_W/2, y: WORLD_H/2};
    }
    return {
      type: 'city',
      width: WORLD_W, height: WORLD_H,
      buildings, decos,
      tile: TILE, cols: COLS, rows: ROWS, roadW: ROAD_W,
      spawn: { x: TILE * 2 + ROAD_W / 2, y: TILE * 2 + ROAD_W / 2, angle: 0 },
      isOffSurface(x, y) { return !isOnRoad(x, y); },
      offSurfacePenalty: 0.96,
      collides(x, y, w, h, angle) {
        const cs = Math.cos(angle), sn = Math.sin(angle);
        const hw = w/2, hh = h/2;
        const corners = [{x:-hw,y:-hh},{x:hw,y:-hh},{x:hw,y:hh},{x:-hw,y:hh}];
        for (const c of corners) {
          const cx = x + c.x*cs - c.y*sn;
          const cy = y + c.x*sn + c.y*cs;
          for (const b of buildings) {
            if (cx > b.x && cx < b.x + b.w && cy > b.y && cy < b.y + b.h) return true;
          }
          if (cx < 0 || cy < 0 || cx > WORLD_W || cy > WORLD_H) return true;
        }
        return false;
      },
      randomPickup: randomSidewalk,
      randomDest: randomSidewalk,
      fixedDest: null,
    };
  }

  // ============ HOUSE WORLD ============
  function buildHouseWorld() {
    const WORLD_W = 1700, WORLD_H = 1300;
    const wt = 30;
    const obstacles = [
      { x: 0, y: 0, w: WORLD_W, h: wt, kind: 'wall' },
      { x: 0, y: WORLD_H - wt, w: WORLD_W, h: wt, kind: 'wall' },
      { x: 0, y: 0, w: wt, h: WORLD_H, kind: 'wall' },
      { x: WORLD_W - wt, y: 0, w: wt, h: WORLD_H, kind: 'wall' },
      { x: 60, y: wt, w: 180, h: 220, kind: 'fridge' },
      { x: 260, y: wt, w: 220, h: 110, kind: 'stove' },
      { x: 500, y: wt, w: 420, h: 110, kind: 'counter' },
      { x: 950, y: wt, w: 220, h: 110, kind: 'sink' },
      { x: 60, y: 400, w: 120, h: 300, kind: 'couch' },
      { x: 230, y: 500, w: 140, h: 90, kind: 'cofftable' },
      { x: WORLD_W/2 - 130, y: WORLD_H - wt - 70, w: 260, h: 70, kind: 'tv' },
      { x: 1180, y: 420, w: 28, h: 28, kind: 'tableleg' },
      { x: 1450, y: 420, w: 28, h: 28, kind: 'tableleg' },
      { x: 1180, y: 690, w: 28, h: 28, kind: 'tableleg' },
      { x: 1450, y: 690, w: 28, h: 28, kind: 'tableleg' },
      { x: 1280, y: 760, w: 60, h: 60, kind: 'chair' },
      { x: WORLD_W - wt - 80, y: 870, w: 80, h: 240, kind: 'shelf' },
      { x: 1320, y: WORLD_H - wt - 110, w: 70, h: 110, kind: 'trash' },
      { x: 350, y: 280, w: 60, h: 60, kind: 'bowl' },
    ];
    const diningTableTop = { x: 1160, y: 410, w: 320, h: 320 };
    const anthill = { x: WORLD_W - 100, y: 150 };
    return {
      type: 'house',
      width: WORLD_W, height: WORLD_H,
      obstacles, diningTableTop, anthill,
      spawn: { x: anthill.x - 40, y: anthill.y + 40, angle: 0 },
      isOffSurface() { return false; },
      offSurfacePenalty: 1.0,
      collides(x, y, w, h, angle) {
        const cs = Math.cos(angle), sn = Math.sin(angle);
        const hw = w/2, hh = h/2;
        const corners = [{x:-hw,y:-hh},{x:hw,y:-hh},{x:hw,y:hh},{x:-hw,y:hh}];
        for (const c of corners) {
          const cx = x + c.x*cs - c.y*sn;
          const cy = y + c.x*sn + c.y*cs;
          for (const o of obstacles) {
            if (cx > o.x && cx < o.x + o.w && cy > o.y && cy < o.y + o.h) return true;
          }
          if (cx < 0 || cy < 0 || cx > WORLD_W || cy > WORLD_H) return true;
        }
        return false;
      },
      randomPickup() {
        for (let i = 0; i < 200; i++) {
          const x = 60 + Math.random() * (WORLD_W - 120);
          const y = 60 + Math.random() * (WORLD_H - 120);
          if (Math.hypot(x - anthill.x, y - anthill.y) < 260) continue;
          let blocked = false;
          for (const o of obstacles) {
            if (x > o.x - 22 && x < o.x + o.w + 22 && y > o.y - 22 && y < o.y + o.h + 22) {
              blocked = true; break;
            }
          }
          if (!blocked) return { x, y };
        }
        return { x: WORLD_W/2, y: WORLD_H/2 };
      },
      randomDest() { return anthill; },
      fixedDest: anthill,
    };
  }

  // ============ SKY WORLD ============
  function buildSkyWorld() {
    const WORLD_W = 4000, WORLD_H = 3000;
    const airports = [
      { x: 700,  y: 600,  name: 'Northport' },
      { x: 2000, y: 700,  name: 'Midfield' },
      { x: 3200, y: 800,  name: 'Eastpoint' },
      { x: 1100, y: 1700, name: 'Lakeside' },
      { x: 2800, y: 1900, name: 'Sunset' },
      { x: 600,  y: 2500, name: 'Southport' },
      { x: 3400, y: 2500, name: 'Cape Field' },
    ];
    // Land patches: each airport gets a cluster of blobs; plus decorative islands
    const landPatches = [];
    let rs = 12345;
    function rng() { rs = (rs * 1664525 + 1013904223) >>> 0; return (rs % 10000) / 10000; }
    for (const ap of airports) {
      const cluster = [];
      cluster.push({ x: ap.x,                       y: ap.y,                       r: 260 });
      cluster.push({ x: ap.x + (rng()-0.5)*220,     y: ap.y + (rng()-0.5)*220,     r: 180 });
      cluster.push({ x: ap.x + (rng()-0.5)*260,     y: ap.y + (rng()-0.5)*260,     r: 200 });
      cluster.push({ x: ap.x + (rng()-0.5)*300,     y: ap.y + (rng()-0.5)*300,     r: 150 });
      landPatches.push(cluster);
    }
    const extraSeeds = [
      { x: 1500, y: 1300 }, { x: 2400, y: 1100 }, { x: 3700, y: 1500 },
      { x: 200,  y: 1200 }, { x: 1900, y: 2700 }, { x: 3000, y: 350 },
      { x: 150, y: 2000 }
    ];
    for (const s of extraSeeds) {
      const cluster = [];
      cluster.push({ x: s.x, y: s.y, r: 90 });
      cluster.push({ x: s.x + (rng()-0.5)*150, y: s.y + (rng()-0.5)*150, r: 70 });
      cluster.push({ x: s.x + (rng()-0.5)*200, y: s.y + (rng()-0.5)*200, r: 60 });
      landPatches.push(cluster);
    }
    const clouds = [];
    for (let i = 0; i < 60; i++) {
      clouds.push({
        x: rng() * WORLD_W,
        y: rng() * WORLD_H,
        size: 40 + rng() * 70,
      });
    }
    const cities = [];
    for (const ap of airports) {
      const buildings = [];
      for (let i = 0; i < 14; i++) {
        const ang = rng() * Math.PI * 2;
        const r = 80 + rng() * 140;
        buildings.push({
          x: ap.x + Math.cos(ang) * r,
          y: ap.y + Math.sin(ang) * r,
          size: 7 + rng() * 9,
          color: `hsl(${30 + (rng()*40)|0}, 25%, ${45 + (rng()*15)|0}%)`,
        });
      }
      cities.push({ ap, buildings });
    }
    return {
      type: 'sky',
      width: WORLD_W, height: WORLD_H,
      airports, landPatches, clouds, cities,
      spawn: { x: airports[0].x, y: airports[0].y + 200, angle: 0 },
      isOffSurface() { return false; },
      offSurfacePenalty: 1.0,
      collides() { return false; },
      randomPickup() { return airports[Math.floor(Math.random() * airports.length)]; },
      randomDest()   { return airports[Math.floor(Math.random() * airports.length)]; },
      fixedDest: null,
    };
  }

  // ============ OCEAN WORLD ============
  function buildOceanWorld() {
    const WORLD_W = 3800, WORLD_H = 2800;
    const ports = [
      { x: 500,  y: 600,  name: 'Port Alpha' },
      { x: 1800, y: 500,  name: 'Port Beta' },
      { x: 3200, y: 700,  name: 'Port Gamma' },
      { x: 800,  y: 1800, name: 'Port Delta' },
      { x: 2600, y: 2000, name: 'Port Epsilon' },
      { x: 3600, y: 1500, name: 'Port Zeta' },
      { x: 1200, y: 2400, name: 'Port Theta' },
    ];
    const islands = [];
    let rs = 54321;
    function rng() { rs = (rs * 1664525 + 1013904223) >>> 0; return (rs % 10000) / 10000; }
    for (let i = 0; i < 18; i++) {
      islands.push({
        x: rng() * WORLD_W,
        y: rng() * WORLD_H,
        r: 40 + rng() * 80,
      });
    }
    const reefs = [];
    for (let i = 0; i < 12; i++) {
      reefs.push({
        x: rng() * WORLD_W,
        y: rng() * WORLD_H,
        rocks: Array.from({ length: 5 + Math.floor(rng() * 5) }, () => ({
          ox: (rng() - 0.5) * 120,
          oy: (rng() - 0.5) * 120,
          r: 12 + rng() * 20,
        }))
      });
    }
    return {
      type: 'ocean',
      width: WORLD_W, height: WORLD_H,
      ports, islands, reefs,
      spawn: { x: ports[0].x, y: ports[0].y + 100, angle: 0 },
      isOffSurface() { return false; },
      offSurfacePenalty: 1.0,
      collides() { return false; },
      randomPickup() { return ports[Math.floor(Math.random() * ports.length)]; },
      randomDest()   { return ports[Math.floor(Math.random() * ports.length)]; },
      fixedDest: null,
    };

  // ============ PLAYER ============
  function createPlayer(kind) {
    if (kind === 'taxi') {
      return {
        kind: 'taxi', x: 0, y: 0, angle: 0, speed: 0,
        w: 22, h: 38,
        maxSpeed: 5.4, maxReverse: -2.6,
        accel: 0.08, brake: 0.18, friction: 0.03, turn: 0.045,
        turnAtRest: false,
      };
    } else if (kind === 'ant') {
      return {
        kind: 'ant', x: 0, y: 0, angle: 0, speed: 0,
        w: 10, h: 16,
        maxSpeed: 4.4, maxReverse: -2.6,
        accel: 0.18, brake: 0.28, friction: 0.08, turn: 0.07,
        turnAtRest: true,
        legPhase: 0,
      };
    } else if (kind === 'plane') {
      return {
        kind: 'plane', x: 0, y: 0, angle: 0, speed: 4,
        w: 28, h: 46,
        minSpeed: 1.6, cruise: 4.5, maxSpeed: 8,
        maxReverse: 0,
        accel: 0.07, brake: 0, friction: 0.05, turn: 0.05,
        turnAtRest: false,
      };
    } else {
      return {
        kind: 'ship', x: 0, y: 0, angle: 0, speed: 0,
        w: 32, h: 48,
        maxSpeed: 4.8, maxReverse: -2.2,
        accel: 0.06, brake: 0.16, friction: 0.04, turn: 0.038,
        turnAtRest: false,
      };
    }
  }

  // ============ PICKUPS ============
  const passengerNames = ['Alex','Maya','Chen','Priya','Diego','Rosa','Sam','Kai','Yuki','Omar','Lola','Theo','Nina','Ravi','Ella'];
  const foodTypes = [
    { name: 'crumb',         value: 3,  draw: drawFoodCrumb },
    { name: 'cereal piece',  value: 5,  draw: drawFoodCereal },
    { name: 'sugar cube',    value: 7,  draw: drawFoodSugar },
    { name: 'candy',         value: 8,  draw: drawFoodCandy },
    { name: 'cookie chunk',  value: 10, draw: drawFoodCookie },
  ];

  function spawnPickup() {
    const pickup = world.randomPickup();
    let dest;
    if (world.fixedDest) dest = world.fixedDest;
    else {
      let tries = 0;
      do { dest = world.randomDest(); tries++; }
      while (dist(pickup, dest) < 360 && tries < 20);
    }
    if (mode === 'taxi') {
      const baseFare = 8 + Math.round(dist(pickup, dest) / 50);
      passenger = {
        pickup, dest,
        name: passengerNames[Math.floor(Math.random()*passengerNames.length)],
        fare: baseFare, status: 'waiting', maxTime: 60, timer: 0, type: 'passenger',
      };
    } else if (mode === 'plane') {
      const baseFare = 15 + Math.round(dist(pickup, dest) / 80);
      passenger = {
        pickup, dest,
        name: passengerNames[Math.floor(Math.random()*passengerNames.length)],
        fare: baseFare, status: 'waiting', maxTime: 90, timer: 0, type: 'passenger',
      };
    } else if (mode === 'ship') {
      const baseFare = 5 + Math.round(dist(pickup, dest) / 120);
      passenger = {
        pickup, dest,
        name: `Crate ${1+Math.floor(Math.random()*99)}`,
        fare: baseFare, status: 'waiting', maxTime: 80, timer: 0, type: 'cargo',
      };
    } else {
      const f = foodTypes[Math.floor(Math.random()*foodTypes.length)];
      passenger = {
        pickup, dest, foodName: f.name, foodDraw: f.draw,
        fare: f.value, status: 'waiting', maxTime: 70, timer: 0, type: 'food',
      };
    }
    updateStatus();
  }

  function updateStatus() {
    const t = document.getElementById('statusTitle');
    const d = document.getElementById('statusDesc');
    if (!mode) { t.textContent = 'Select a vehicle'; d.textContent = 'Pick a mode to start driving.'; return; }
    if (!passenger) {
      t.textContent = MODES[mode].statusInitial.t;
      d.textContent = MODES[mode].statusInitial.d;
      return;
    }
    if (mode === 'taxi') {
      if (passenger.status === 'waiting') {
        t.textContent = `${passenger.name} needs a ride`;
        d.textContent = `Head to the cyan marker. Fare: $${passenger.fare}.`;
      } else {
        t.textContent = `Driving ${passenger.name}`;
        d.textContent = `Drop them off at the red marker. Faster drop-offs earn bigger tips.`;
      }
    } else if (mode === 'plane') {
      if (passenger.status === 'waiting') {
        t.textContent = `Pick up ${passenger.name}`;
        d.textContent = `Land at ${passenger.pickup.name}. Fare: $${passenger.fare}. Throttle down to land.`;
      } else {
        t.textContent = `Flying ${passenger.name}`;
        d.textContent = `Destination: ${passenger.dest.name}. Throttle down to land on the runway.`;
      }
    } else if (mode === 'ship') {
      if (passenger.status === 'waiting') {
        t.textContent = `Load ${passenger.name}`;
        d.textContent = `Navigate to ${passenger.pickup.name}. Avoid the mines and bombs! Worth ${passenger.fare} supply points.`;
      } else {
        t.textContent = `Delivering ${passenger.name}`;
        d.textContent = `Head to ${passenger.dest.name}. Watch for hazards!`;
      }
    } else {
      if (passenger.status === 'waiting') {
        t.textContent = `Grab the ${passenger.foodName}`;
        d.textContent = `Crawl to the cyan marker. Worth ${passenger.fare}. Watch for shadows above!`;
      } else {
        t.textContent = `Hauling ${passenger.foodName}`;
        d.textContent = `Get back to the anthill. Mind the giant feet!`;
      }
    }
  }

  function showMessage(text, color) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.style.color = color || (mode ? MODES[mode].accent : '#ffd84a');
    el.classList.add('show');
    clearTimeout(showMessage._t);
    showMessage._t = setTimeout(() => el.classList.remove('show'), 1400);
  }

  // ============ HAZARDS ============
  function spawnFoot() {
    let tx, ty;
    if (Math.random() < 0.6 && player) {
      const lead = 60 + Math.random() * 80;
      tx = player.x + Math.sin(player.angle) * player.speed * 6 + (Math.random() - 0.5) * lead;
      ty = player.y - Math.cos(player.angle) * player.speed * 6 + (Math.random() - 0.5) * lead;
    } else {
      tx = 60 + Math.random() * (world.width - 120);
      ty = 60 + Math.random() * (world.height - 120);
    }
    tx = clamp(tx, 60, world.width - 60);
    ty = clamp(ty, 60, world.height - 60);
    hazards.push({
      x: tx, y: ty, age: 0,
      warnDur: 1.1 + Math.random() * 0.5,
      stompDur: 0.18, liftDur: 0.55,
      radius: 70 + Math.random() * 20,
      state: 'warn',
    });
  }

  function spawnBomb() {
    let bx = 100 + Math.random() * (world.width - 200);
    let by = 100 + Math.random() * (world.height - 200);
    const vx = (Math.random() - 0.5) * 1.6;
    const vy = (Math.random() - 0.5) * 1.6;
    hazards.push({
      x: bx, y: by, vx, vy,
      age: 0, maxLife: 6 + Math.random() * 4,
      radius: 18 + Math.random() * 8,
      state: 'drift', type: 'bomb',
    });
  }

  function updateHazards(dt) {
    if (!MODES[mode].hasHazards) return;

    if (mode === 'ship') {
      hazardTimer -= dt;
      if (hazardTimer <= 0) {
        spawnBomb();
        hazardTimer = 2.0 + Math.random() * 2.8;
      }
      for (let i = hazards.length - 1; i >= 0; i--) {
        const b = hazards[i];
        b.age += dt;
        if (b.age >= b.maxLife) { hazards.splice(i, 1); continue; }
        b.x += b.vx;
        b.y += b.vy;
        b.x = clamp(b.x, b.radius + 20, world.width - b.radius - 20);
        b.y = clamp(b.y, b.radius + 20, world.height - b.radius - 20);
        if (invuln <= 0 && Math.hypot(player.x - b.x, player.y - b.y) < player.w/2 + b.radius) {
          lives -= 1; invuln = 1.6;
          showMessage('BOOM! Hull damage!', '#f55');
          if (passenger && passenger.status === 'onboard') {
            showMessage('Lost the cargo!', '#f88');
            passenger.status = 'waiting';
            updateStatus();
          }
          if (lives <= 0) { endGame(); return; }
          hazards.splice(i, 1);
        }
      }
    } else {
      hazardTimer -= dt;
      if (hazardTimer <= 0) {
        spawnFoot();
        hazardTimer = 1.8 + Math.random() * 2.2;
      }
      for (let i = hazards.length - 1; i >= 0; i--) {
        const f = hazards[i];
        f.age += dt;
        if (f.state === 'warn' && f.age >= f.warnDur) {
          f.state = 'stomp'; f.age = 0; shake = 12;
          if (invuln <= 0 && Math.hypot(player.x - f.x, player.y - f.y) < f.radius * 0.9) {
            lives -= 1; invuln = 1.6;
            showMessage('STOMPED!', '#f55');
            if (passenger && passenger.status === 'onboard') {
              showMessage('Dropped the food!', '#f88');
              passenger.status = 'waiting';
              updateStatus();
            }
            if (lives <= 0) { endGame(); return; }
          }
        } else if (f.state === 'stomp' && f.age >= f.stompDur) {
          f.state = 'lift'; f.age = 0;
        } else if (f.state === 'lift' && f.age >= f.liftDur) {
          hazards.splice(i, 1);
        }
      }
    }
  }

  // ============ UPDATE ============
  function update(dt) {
    if (!running) return;
    timeLeft -= dt;
    if (timeLeft <= 0) { timeLeft = 0; endGame(); return; }

    if (invuln > 0) invuln -= dt;
    if (shake > 0) shake = Math.max(0, shake - dt * 40);

    const accelI = (keys['w'] || keys['arrowup']) ? 1 : 0;
    const revI = (keys['s'] || keys['arrowdown']) ? 1 : 0;
    const brakeI = keys[' '] ? 1 : 0;
    const leftI = (keys['a'] || keys['arrowleft']) ? 1 : 0;
    const rightI = (keys['d'] || keys['arrowright']) ? 1 : 0;

    if (player.kind === 'plane') {
      // Plane: always moving forward, no brake, drifts toward cruise
      if (accelI) player.speed += player.accel;
      else if (revI) player.speed -= player.accel;
      else {
        if (player.speed > player.cruise) player.speed = Math.max(player.cruise, player.speed - player.friction);
        else if (player.speed < player.cruise) player.speed = Math.min(player.cruise, player.speed + player.friction);
      }
      player.speed = clamp(player.speed, player.minSpeed, player.maxSpeed);
    } else {
      if (accelI) player.speed += player.accel;
      else if (revI) player.speed -= player.accel;
      else {
        if (player.speed > 0) player.speed = Math.max(0, player.speed - player.friction);
        else if (player.speed < 0) player.speed = Math.min(0, player.speed + player.friction);
      }
      if (brakeI) {
        if (player.speed > 0) player.speed = Math.max(0, player.speed - player.brake);
        else if (player.speed < 0) player.speed = Math.min(0, player.speed + player.brake);
      }
      player.speed = clamp(player.speed, player.maxReverse, player.maxSpeed);
    }

    if (player.turnAtRest) {
      if (leftI) player.angle -= player.turn;
      if (rightI) player.angle += player.turn;
    } else {
      const speedFrac = Math.abs(player.speed) / player.maxSpeed;
      const dir = player.speed >= 0 ? 1 : -1;
      const rate = player.turn * speedFrac * dir;
      if (leftI) player.angle -= rate * 1.4;
      if (rightI) player.angle += rate * 1.4;
    }

    if (world.isOffSurface(player.x, player.y)) player.speed *= world.offSurfacePenalty;

    const dx = Math.sin(player.angle) * player.speed;
    const dy = -Math.cos(player.angle) * player.speed;
    let hit = false;
    if (!world.collides(player.x + dx, player.y + dy, player.w, player.h, player.angle)) {
      player.x += dx; player.y += dy;
    } else if (Math.abs(dx) > 0.01 && !world.collides(player.x + dx, player.y, player.w, player.h, player.angle)) {
      player.x += dx; hit = true;
    } else if (Math.abs(dy) > 0.01 && !world.collides(player.x, player.y + dy, player.w, player.h, player.angle)) {
      player.y += dy; hit = true;
    } else {
      hit = true;
    }
    if (hit) {
      if (Math.abs(player.speed) > 2.5 && mode === 'taxi') showMessage('CRASH!', '#f66');
      if (mode === 'taxi') player.speed *= -0.35;
      else if (mode === 'ant') player.speed = 0;
      // plane never hits
    }

    if (world.collides(player.x, player.y, player.w, player.h, player.angle)) {
      for (let attempts = 0; attempts < 20; attempts++) {
        const pd = 1 + attempts * 0.5;
        let escaped = false;
        for (let i = 0; i < 16; i++) {
          const a = (i / 16) * Math.PI * 2;
          const px = player.x + Math.cos(a) * pd;
          const py = player.y + Math.sin(a) * pd;
          if (!world.collides(px, py, player.w, player.h, player.angle)) {
            player.x = px; player.y = py;
            escaped = true; break;
          }
        }
        if (escaped) break;
      }
    }

    cam.x += (player.x - cam.x) * 0.12;
    cam.y += (player.y - cam.y) * 0.12;

    if (player.kind === 'ant') player.legPhase += Math.abs(player.speed) * dt * 12;

    updateHazards(dt);

    if (!passenger) spawnPickup();
    if (passenger) {
      passenger.timer += dt;
      const stopOK = Math.abs(player.speed) < MODES[mode].stopSpeed;
      const pickupR = MODES[mode].pickupRadius;
      if (passenger.status === 'waiting') {
        if (dist(player, passenger.pickup) < pickupR && stopOK) {
          passenger.status = 'onboard';
          if (mode === 'taxi') showMessage(`${passenger.name} hopped in!`, '#4fd');
          else if (mode === 'plane') showMessage(`${passenger.name} boarded!`, '#4fd');
          else if (mode === 'ship') showMessage(`${passenger.name} loaded!`, '#4fd');
          else showMessage(`Got the ${passenger.foodName}!`, '#4fd');
          updateStatus();
        } else if (passenger.timer > passenger.maxTime) {
          if (mode === 'taxi') showMessage(`${passenger.name} gave up...`, '#f88');
          else if (mode === 'plane') showMessage(`${passenger.name} missed the flight...`, '#f88');
          else if (mode === 'ship') showMessage(`Cargo reassigned...`, '#f88');
          else showMessage(`Other ants got it first...`, '#f88');
          passenger = null;
        }
      } else {
        if (dist(player, passenger.dest) < pickupR + 6 && stopOK) {
          let total = passenger.fare;
          if (mode === 'taxi') {
            const tip = Math.max(0, Math.round((passenger.maxTime - passenger.timer + 30) * 0.2));
            total = passenger.fare + tip;
            showMessage(`+$${total} ${tip>0 ? `(tip $${tip})` : ''}`, '#4fd');
          } else if (mode === 'plane') {
            const tip = Math.max(0, Math.round((passenger.maxTime - passenger.timer + 30) * 0.15));
            total = passenger.fare + tip;
            showMessage(`+$${total} ${tip>0 ? `(tip $${tip})` : ''}`, '#4fd');
          } else if (mode === 'ship') {
            const bonus = Math.max(0, Math.round((passenger.maxTime - passenger.timer) * 0.08));
            total = passenger.fare + bonus;
            showMessage(`+${total} supplies${bonus>0 ? ` (on time!)` : ''}`, '#4fd');
          } else {
            const bonus = Math.max(0, Math.round((passenger.maxTime - passenger.timer) * 0.05));
            total = passenger.fare + bonus;
            showMessage(`+${total} food${bonus>0 ? ` (fresh!)` : ''}`, '#4fd');
          }
          money += total;
          fares += 1;
          passenger = null;
          updateStatus();
        }
      }
    }

    document.getElementById('money').textContent = `${MODES[mode].earnPrefix}${money}`;
    document.getElementById('fares').textContent = fares;
    const m = Math.floor(timeLeft / 60), s = Math.floor(timeLeft % 60);
    document.getElementById('time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    document.getElementById('speed').textContent = `${Math.round(Math.abs(player.speed) * MODES[mode].speedMul)}${MODES[mode].speedSuffix}`;
    if (MODES[mode].hasLives) {
      const L = Math.max(0, lives);
      document.getElementById('lives').textContent = '❤'.repeat(L) + '·'.repeat(Math.max(0, MODES[mode].lives - L));
    }
  }

  // ============ DRAW ============
  function draw() {
    ctx.fillStyle = MODES[mode].bgClear;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    const sx = (Math.random() - 0.5) * shake;
    const sy = (Math.random() - 0.5) * shake;
    ctx.translate(W / 2 - cam.x + sx, H / 2 - cam.y + sy);

    if (world.type === 'city') drawCityBg();
    else if (world.type === 'house') drawHouseBg();
    else if (world.type === 'sky') drawSkyBg();
    else if (world.type === 'ocean') drawOceanBg();

    if (world.type === 'sky') {
      for (const ap of world.airports) drawAirport(ap);
    }

    if (world.type === 'ocean') {
      for (const port of world.ports) drawPort(port);
    }

    if (passenger) {
      const t = performance.now() / 300;
      if (passenger.status === 'waiting') {
        drawMarker(passenger.pickup.x, passenger.pickup.y, '#4fd', 1 + Math.sin(t) * 0.2);
        if (passenger.type === 'passenger') drawPerson(passenger.pickup.x, passenger.pickup.y);
        else if (passenger.type === 'cargo') drawCargo(passenger.pickup.x, passenger.pickup.y);
        else passenger.foodDraw(passenger.pickup.x, passenger.pickup.y, 1);
      }
      if (mode !== 'ant' || passenger.status === 'onboard') {
        drawMarker(passenger.dest.x, passenger.dest.y, '#f55', 1 + Math.cos(t) * 0.2);
      }
      drawOffscreenArrow(passenger.status === 'waiting' ? passenger.pickup : passenger.dest,
                         passenger.status === 'waiting' ? '#4fd' : '#f55');
    }

    if (world.type === 'house') drawAnthill(world.anthill.x, world.anthill.y);

    if (world.type === 'sky') drawClouds();

    if (player.kind === 'taxi') drawTaxiCar(player.x, player.y, player.angle);
    else if (player.kind === 'ant') drawAntChar(player.x, player.y, player.angle, player.legPhase, passenger && passenger.status === 'onboard' ? passenger : null);
    else if (player.kind === 'plane') drawPlaneCharacter(player.x, player.y, player.angle);
    else if (player.kind === 'ship') drawShipCharacter(player.x, player.y, player.angle);

    for (const f of hazards) {
      if (f.type === 'bomb') drawBomb(f);
      else drawFoot(f);
    }

    ctx.restore();
  }

  function drawCityBg() {
    const WORLD_W = world.width, WORLD_H = world.height;
    const TILE = world.tile, ROAD_W = world.roadW;
    ctx.fillStyle = '#3a3a3a';
    for (let r = 0; r <= world.rows; r++) {
      const y = r * TILE - ROAD_W;
      ctx.fillRect(0, y, WORLD_W, ROAD_W * 2);
    }
    for (let c = 0; c <= world.cols; c++) {
      const x = c * TILE - ROAD_W;
      ctx.fillRect(x, 0, ROAD_W * 2, WORLD_H);
    }
    ctx.fillStyle = '#7a7a7a';
    const sw = 6;
    for (let r = 0; r <= world.rows; r++) {
      ctx.fillRect(0, r * TILE - ROAD_W - sw, WORLD_W, sw);
      ctx.fillRect(0, r * TILE + ROAD_W, WORLD_W, sw);
    }
    for (let c = 0; c <= world.cols; c++) {
      ctx.fillRect(c * TILE - ROAD_W - sw, 0, sw, WORLD_H);
      ctx.fillRect(c * TILE + ROAD_W, 0, sw, WORLD_H);
    }
    ctx.strokeStyle = '#ffd84a';
    ctx.lineWidth = 2;
    ctx.setLineDash([14, 14]);
    for (let r = 0; r <= world.rows; r++) {
      const y = r * TILE;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WORLD_W, y); ctx.stroke();
    }
    for (let c = 0; c <= world.cols; c++) {
      const x = c * TILE;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_H); ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    for (let r = 0; r <= world.rows; r++) {
      for (let c = 0; c <= world.cols; c++) {
        ctx.fillRect(c * TILE - ROAD_W, r * TILE - ROAD_W, ROAD_W * 2, ROAD_W * 2);
      }
    }
    const viewL = cam.x - W/2 - 50, viewR = cam.x + W/2 + 50;
    const viewT = cam.y - H/2 - 50, viewB = cam.y + H/2 + 50;
    for (const b of world.buildings) {
      if (b.x + b.w < viewL || b.x > viewR || b.y + b.h < viewT || b.y > viewB) continue;
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(b.x + 4, b.y + 6, b.w, b.h);
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = b.roof;
      ctx.lineWidth = 2;
      ctx.strokeRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
      ctx.fillStyle = 'rgba(255, 220, 130, 0.5)';
      for (let yy = b.y + 8; yy < b.y + b.h - 6; yy += 14) {
        for (let xx = b.x + 6; xx < b.x + b.w - 6; xx += 12) {
          if (((xx * 13 + yy * 7) % 5) > 1) ctx.fillRect(xx, yy, 4, 4);
        }
      }
    }
    for (const d of world.decos) {
      if (d.x < viewL || d.x > viewR || d.y < viewT || d.y > viewB) continue;
      if (d.kind === 'tree') {
        ctx.fillStyle = '#1f3a1f';
        ctx.beginPath(); ctx.arc(d.x + 1, d.y + 2, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#3aa83a';
        ctx.beginPath(); ctx.arc(d.x, d.y, 6, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = '#cc3030';
        ctx.fillRect(d.x - 2, d.y - 3, 4, 6);
      }
    }
  }

  function drawHouseBg() {
    const w = world.width, h = world.height;
    ctx.fillStyle = '#a8794a';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = 'rgba(70, 40, 20, 0.45)';
    ctx.lineWidth = 1;
    const plankH = 70;
    for (let y = 0; y < h; y += plankH) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      const offset = (Math.floor(y / plankH) * 137) % 300;
      for (let x = offset - 600; x < w; x += 300) {
        if (x > 0 && x < w) {
          ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + plankH); ctx.stroke();
        }
      }
    }
    ctx.fillStyle = 'rgba(80, 40, 10, 0.06)';
    for (let y = 0; y < h; y += plankH) {
      ctx.fillRect(0, y + plankH - 6, w, 4);
    }
    ctx.fillStyle = '#7a3a3a';
    ctx.fillRect(200, 740, 480, 320);
    ctx.fillStyle = '#a04848';
    ctx.fillRect(220, 760, 440, 280);
    ctx.strokeStyle = '#ffd2a0';
    ctx.lineWidth = 2;
    ctx.strokeRect(240, 780, 400, 240);
    const dt = world.diningTableTop;
    ctx.fillStyle = 'rgba(100, 60, 30, 0.35)';
    ctx.fillRect(dt.x, dt.y, dt.w, dt.h);
    ctx.strokeStyle = 'rgba(70, 40, 20, 0.55)';
    ctx.lineWidth = 3;
    ctx.strokeRect(dt.x, dt.y, dt.w, dt.h);
    for (const o of world.obstacles) drawObstacle(o);
  }

  function drawSkyBg() {
    const w = world.width, h = world.height;
    // Ocean base
    ctx.fillStyle = '#5e92b8';
    ctx.fillRect(0, 0, w, h);
    // Ocean shimmer pattern
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    for (let y = 0; y < h; y += 60) {
      for (let x = 0; x < w; x += 80) {
        const ox = (Math.floor(y/60) % 2) * 40;
        ctx.beginPath();
        ctx.ellipse(x + ox, y + 30, 12, 2, 0, 0, Math.PI*2);
        ctx.fill();
      }
    }
    // Land patches: coast shadow + main land + highlight
    for (const cluster of world.landPatches) {
      ctx.fillStyle = '#3a684a';
      for (const blob of cluster) {
        ctx.beginPath();
        ctx.arc(blob.x + 4, blob.y + 6, blob.r + 5, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = '#7ea862';
      for (const blob of cluster) {
        ctx.beginPath();
        ctx.arc(blob.x, blob.y, blob.r, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = '#a0c878';
      for (const blob of cluster) {
        ctx.beginPath();
        ctx.arc(blob.x - 6, blob.y - 10, blob.r * 0.65, 0, Math.PI*2);
        ctx.fill();
      }
      // Sand around edges
      ctx.fillStyle = 'rgba(220, 190, 130, 0.5)';
      for (const blob of cluster) {
        ctx.beginPath();
        ctx.arc(blob.x + 2, blob.y + 4, blob.r + 2, 0, Math.PI*2);
        ctx.lineWidth = 6;
        ctx.strokeStyle = 'rgba(220, 190, 130, 0.5)';
        ctx.stroke();
      }
    }
    // Cities (decorative buildings around airports)
    for (const city of world.cities) {
      for (const b of city.buildings) {
        ctx.fillStyle = 'rgba(60, 40, 20, 0.5)';
        ctx.fillRect(b.x + 1, b.y + 2, b.size, b.size);
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.size, b.size);
        ctx.fillStyle = '#3a2a1c';
        ctx.fillRect(b.x, b.y, b.size, 2);
      }
    }
  }

  function drawOceanBg() {
    const w = world.width, h = world.height;
    ctx.fillStyle = '#3a6fa0';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    for (let y = 0; y < h; y += 50) {
      for (let x = 0; x < w; x += 70) {
        const ox = (Math.floor(y/50) % 2) * 35;
        ctx.beginPath();
        ctx.ellipse(x + ox, y + 25, 16, 3, 0, 0, Math.PI*2);
        ctx.fill();
      }
    }
    for (const island of world.islands) {
      ctx.fillStyle = 'rgba(60, 100, 60, 0.4)';
      ctx.beginPath(); ctx.arc(island.x + 3, island.y + 3, island.r + 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#7ea862';
      ctx.beginPath(); ctx.arc(island.x, island.y, island.r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#a0c878';
      ctx.beginPath(); ctx.arc(island.x - 4, island.y - 6, island.r * 0.6, 0, Math.PI*2); ctx.fill();
    }
    for (const reef of world.reefs) {
      for (const rock of reef.rocks) {
        ctx.fillStyle = 'rgba(80, 80, 100, 0.5)';
        ctx.beginPath(); ctx.arc(reef.x + rock.ox + 1, reef.y + rock.oy + 1, rock.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#6a7a9a';
        ctx.beginPath(); ctx.arc(reef.x + rock.ox, reef.y + rock.oy, rock.r, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  function drawPort(port) {
    ctx.save();
    ctx.translate(port.x, port.y);
    ctx.fillStyle = '#c8c8a8';
    ctx.fillRect(-50, -30, 100, 60);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    ctx.strokeRect(-50, -30, 100, 60);
    ctx.fillStyle = '#8a8a6a';
    ctx.fillRect(-45, -25, 20, 50);
    ctx.fillRect(25, -25, 20, 50);
    ctx.fillStyle = '#666';
    ctx.fillRect(-8, -40, 16, 12);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';

  function drawClouds() {
    for (const cl of world.clouds) {
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.arc(cl.x, cl.y, cl.size * 0.4, 0, Math.PI*2);
      ctx.arc(cl.x + cl.size * 0.3, cl.y - cl.size * 0.1, cl.size * 0.5, 0, Math.PI*2);
      ctx.arc(cl.x + cl.size * 0.6, cl.y, cl.size * 0.4, 0, Math.PI*2);
      ctx.arc(cl.x + cl.size * 0.3, cl.y + cl.size * 0.15, cl.size * 0.45, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawAirport(ap) {
    ctx.save();

    // Runway
    ctx.fillStyle = '#3a3a3e';
    ctx.fillRect(-32, -130, 64, 260);

    for (let y = -110; y < 110; y += 30) {
      ctx.fillRect(-3, y, 6, 18);
    }
    // Threshold markings
    for (let i = 0; i < 5; i++) {
      ctx.fillRect(-22 + i * 10, -126, 6, 14);
      ctx.fillRect(-22 + i * 10, 112, 6, 14);
    }

    ctx.fillStyle = 'rgba(0,0,0,0.3)';

    ctx.fillStyle = '#5588cc';
    for (let y = -16; y < 14; y += 6) {
      ctx.fillRect(-62, y, 3, 3);
      ctx.fillRect(-50, y, 3, 3);
    }
    // Tower

    ctx.fillRect(46, -10, 12, 30);

  function drawObstacle(o) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(o.x + 3, o.y + 5, o.w, o.h);
    switch (o.kind) {
      case 'wall':
        ctx.fillStyle = '#5a4030'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = '#3a2818'; ctx.lineWidth = 2; ctx.strokeRect(o.x, o.y, o.w, o.h); break;
      case 'fridge':
        ctx.fillStyle = '#dde0e6'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.strokeRect(o.x, o.y, o.w, o.h);
        ctx.beginPath(); ctx.moveTo(o.x, o.y + o.h * 0.4); ctx.lineTo(o.x + o.w, o.y + o.h * 0.4); ctx.stroke();
        ctx.fillStyle = '#666';
        ctx.fillRect(o.x + o.w - 14, o.y + 14, 6, 24);
        ctx.fillRect(o.x + o.w - 14, o.y + o.h * 0.4 + 14, 6, 24); break;
      case 'stove':
        ctx.fillStyle = '#2a2a2e'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = '#444';
        for (let i = 0; i < 4; i++) {
          const cx = o.x + 30 + (i % 2) * (o.w - 60);
          const cy = o.y + 25 + Math.floor(i / 2) * (o.h - 50);
          ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
          ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.stroke();
        } break;
      case 'counter':
        ctx.fillStyle = '#bda078'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = '#8a7050'; ctx.lineWidth = 2; ctx.strokeRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = 'rgba(120, 80, 40, 0.4)'; ctx.lineWidth = 1;
        for (let x = o.x + 20; x < o.x + o.w; x += 40) {
          ctx.beginPath(); ctx.moveTo(x, o.y); ctx.lineTo(x + 4, o.y + o.h); ctx.stroke();
        } break;
      case 'sink':
        ctx.fillStyle = '#bda078'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = '#8aa0b0'; ctx.fillRect(o.x + 30, o.y + 20, o.w - 60, o.h - 40);
        ctx.fillStyle = '#aac';    ctx.fillRect(o.x + 50, o.y + 35, o.w - 100, o.h - 70);
        ctx.fillStyle = '#888';    ctx.fillRect(o.x + o.w/2 - 4, o.y + 10, 8, 18); break;
      case 'couch':
        ctx.fillStyle = '#6a5588'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = '#7e6a9c'; ctx.fillRect(o.x + 8, o.y + 12, o.w - 16, o.h - 24);
        ctx.fillStyle = '#584673';
        ctx.fillRect(o.x, o.y, o.w, 14);
        ctx.fillRect(o.x, o.y + o.h - 14, o.w, 14); break;
      case 'cofftable':
        ctx.fillStyle = '#5c3a20'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = '#3c2410'; ctx.lineWidth = 2; ctx.strokeRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = 'rgba(140, 90, 50, 0.6)'; ctx.lineWidth = 1;
        for (let x = o.x + 10; x < o.x + o.w; x += 20) {
          ctx.beginPath(); ctx.moveTo(x, o.y); ctx.lineTo(x, o.y + o.h); ctx.stroke();
        } break;
      case 'tv':
        ctx.fillStyle = '#3a3a3a'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = '#101820'; ctx.fillRect(o.x + 30, o.y + 8, o.w - 60, o.h - 30);
        ctx.fillStyle = 'rgba(100, 180, 255, 0.3)';
        ctx.fillRect(o.x + 34, o.y + 12, o.w - 68, o.h - 38); break;
      case 'tableleg':
        ctx.fillStyle = '#5c3a20'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = '#3c2410'; ctx.lineWidth = 2; ctx.strokeRect(o.x, o.y, o.w, o.h); break;
      case 'chair':
        ctx.fillStyle = '#8a6a4a'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = '#5c3a20'; ctx.lineWidth = 2; ctx.strokeRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = '#5c3a20'; ctx.fillRect(o.x, o.y, o.w, 8); break;
      case 'shelf':
        ctx.fillStyle = '#6a4828'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = '#3a2818'; ctx.fillRect(o.x + 4, o.y + 4, o.w - 8, o.h - 8);
        for (let y = o.y + 10; y < o.y + o.h - 10; y += 35) {
          for (let x = o.x + 8; x < o.x + o.w - 8; x += 10) {
            ctx.fillStyle = `hsl(${(x*13+y*7) % 360}, 50%, 45%)`;
            ctx.fillRect(x, y, 7, 26);
          }
        } break;
      case 'trash':
        ctx.fillStyle = '#3a3a3a'; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = '#5a5a5a'; ctx.fillRect(o.x + 4, o.y - 6, o.w - 8, 10);
        ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(o.x, o.y + i * (o.h / 4) + 10);
          ctx.lineTo(o.x + o.w, o.y + i * (o.h / 4) + 10);
          ctx.stroke();
        } break;
      case 'bowl':
        ctx.fillStyle = '#c84030';
        ctx.beginPath();
        ctx.ellipse(o.x + o.w/2, o.y + o.h/2, o.w/2, o.h/2, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#7a2818';
        ctx.beginPath();
        ctx.ellipse(o.x + o.w/2, o.y + o.h/2, o.w/2.5, o.h/2.5, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#d4a060';
        for (let i = 0; i < 8; i++) {
          const ang = i * 0.8;
          ctx.beginPath();
          ctx.arc(o.x + o.w/2 + Math.cos(ang)*8, o.y + o.h/2 + Math.sin(ang)*8, 2, 0, Math.PI*2);
          ctx.fill();
        } break;
    }
    ctx.restore();
  }

  function drawAnthill(x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#3a2410';
    ctx.beginPath(); ctx.ellipse(0, 4, 50, 18, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6a4828';
    ctx.beginPath(); ctx.ellipse(0, 0, 44, 26, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8a6840';
    ctx.beginPath(); ctx.ellipse(0, -2, 36, 22, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a0c04';
    ctx.beginPath(); ctx.ellipse(0, -2, 10, 7, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a2410';
    for (let i = 0; i < 12; i++) {
      const a = i * 0.7, r = 30 + (i % 3) * 4;
      ctx.beginPath(); ctx.arc(Math.cos(a) * r, Math.sin(a) * r * 0.5, 1.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawMarker(x, y, color, pulse) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = color + '33';
    ctx.beginPath(); ctx.arc(0, 0, 22 * pulse, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(0, -14, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-6, -10); ctx.lineTo(6, -10); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, -14, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawPerson(x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#3a6cd6';
    ctx.fillRect(-3, -4, 6, 8);
    ctx.fillStyle = '#f0c08a';
    ctx.beginPath(); ctx.arc(0, -7, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawOffscreenArrow(target, color) {
    const sx = target.x - cam.x;
    const sy = target.y - cam.y;
    const halfW = W/2 - 60, halfH = H/2 - 60;
    if (Math.abs(sx) < halfW && Math.abs(sy) < halfH) return;
    const ang = Math.atan2(sy, sx);
    const r = Math.min(halfW, halfH) * 0.9;
    const ax = Math.cos(ang) * r, ay = Math.sin(ang) * r;
    ctx.save();
    ctx.translate(cam.x + ax, cam.y + ay);
    ctx.rotate(ang);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(14, 0); ctx.lineTo(-6, -8); ctx.lineTo(-6, 8);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawTaxiCar(x, y, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    const w = 22, h = 38;
    const body = customization.taxi;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(-w/2 + 2, -h/2 + 3, w, h);
    ctx.fillStyle = body;
    ctx.fillRect(-w/2, -h/2, w, h);
    ctx.fillStyle = '#222';
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(-w/2 + i * 6, -2, 3, 4);
      ctx.fillRect(-w/2 + i * 6 + 3, 2, 3, 4);
    }
    ctx.fillStyle = '#aee';
    ctx.fillRect(-w/2 + 3, -h/2 + 4, w - 6, 8);
    ctx.fillStyle = '#9cd';
    ctx.fillRect(-w/2 + 3, h/2 - 11, w - 6, 7);
    ctx.fillStyle = '#fff8a8';
    ctx.fillRect(-w/2 + 2, -h/2 - 1, 5, 2);
    ctx.fillRect(w/2 - 7, -h/2 - 1, 5, 2);
    ctx.fillStyle = '#d22';
    ctx.fillRect(-w/2 + 2, h/2 - 1, 5, 2);
    ctx.fillRect(w/2 - 7, h/2 - 1, 5, 2);
    ctx.fillStyle = '#000';
    ctx.fillRect(-6, -4, 12, 5);
    ctx.fillStyle = body;
    ctx.font = 'bold 6px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('TAXI', 0, -1);
    ctx.restore();
  }

  function drawAntChar(x, y, angle, legPhase, carrying) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    if (invuln > 0 && Math.floor(invuln * 12) % 2 === 0) ctx.globalAlpha = 0.4;
    const body = customization.ant;
    const leg = darken(body, 0.4);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(2, 3, 10, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = leg;
    ctx.lineWidth = 1.5;
    const sw = Math.sin(legPhase) * 2;
    const sw2 = Math.sin(legPhase + Math.PI) * 2;
    ctx.beginPath(); ctx.moveTo(-1, -5); ctx.lineTo(-8 + sw, -8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-1, 0); ctx.lineTo(-9 + sw2, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-1, 5); ctx.lineTo(-8 + sw, 9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(1, -5); ctx.lineTo(8 - sw, -8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(1, 0); ctx.lineTo(9 - sw2, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(1, 5); ctx.lineTo(8 - sw, 9); ctx.stroke();
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.ellipse(0, 5, 4.5, 5.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, -1, 3.5, 3.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, -7, 3.5, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = leg;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-1.5, -8); ctx.lineTo(-3 + sw*0.5, -11); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(1.5, -8); ctx.lineTo(3 - sw*0.5, -11); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.fillRect(-2, -8, 1, 1);
    ctx.fillRect(1, -8, 1, 1);
    if (carrying) {
      ctx.save();
      ctx.translate(0, -3);
      ctx.scale(0.85, 0.85);
      carrying.foodDraw(0, 0, 0.85);
      ctx.restore();
    }
    ctx.restore();
  }

  function drawPlaneCharacter(x, y, angle) {
    const body = customization.plane;
    const accent = darken(body, 0.55);
    // Shadow on the ground, offset SE
    ctx.save();
    ctx.translate(x + 18, y + 26);
    ctx.rotate(angle);
    ctx.fillStyle = 'rgba(0, 0, 30, 0.3)';
    ctx.beginPath(); ctx.ellipse(0, 0, 6, 22, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(-26, -3, 52, 6);
    ctx.fillRect(-11, 12, 22, 4);
    ctx.restore();

    // Plane
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    // Tail wing
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(-12, 12, 24, 5);
    ctx.fillStyle = '#888';
    ctx.fillRect(-2, 13, 4, 9);
    // Main wings
    ctx.fillStyle = body;
    ctx.fillRect(-26, -4, 52, 9);
    ctx.fillStyle = accent;
    ctx.fillRect(-26, 0, 52, 2);
    // Wing tip lights
    ctx.fillStyle = '#fa3';
    ctx.fillRect(-26, -4, 3, 9);
    ctx.fillStyle = '#3af';
    ctx.fillRect(23, -4, 3, 9);
    // Body
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.ellipse(0, 0, 6, 22, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(0, 0, 6, 22, 0, 0, Math.PI*2);
    ctx.stroke();
    // Accent stripe
    ctx.fillStyle = accent;
    ctx.fillRect(-1, -18, 2, 28);
    // Cockpit
    ctx.fillStyle = '#3a6a99';
    ctx.beginPath();
    ctx.ellipse(0, -12, 3.5, 6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#9bd';
    ctx.beginPath();
    ctx.ellipse(-1.2, -13, 1.2, 2.4, 0, 0, Math.PI*2);
    ctx.fill();
    // Propeller
    const propT = performance.now() / 25;
    ctx.fillStyle = 'rgba(40, 40, 40, 0.3)';
    ctx.beginPath(); ctx.arc(0, -22, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(30, 30, 30, 0.7)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 2; i++) {
      const a = propT + i * Math.PI;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * 8, -22 + Math.sin(a) * 2);
      ctx.lineTo(Math.cos(a + Math.PI) * 8, -22 + Math.sin(a + Math.PI) * 2);
      ctx.stroke();
    }
    // Propeller hub
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.arc(0, -22, 2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawShipCharacter(x, y, angle) {
    const body = customization.ship;
    const trim = darken(body, 0.45);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.moveTo(-16, 6);
    ctx.lineTo(16, 6);
    ctx.lineTo(10, 24);
    ctx.lineTo(-10, 24);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.moveTo(-16, 0);
    ctx.lineTo(16, 0);
    ctx.lineTo(10, 20);
    ctx.lineTo(-10, 20);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = trim;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = trim;
    ctx.fillRect(-14, -4, 28, 4);
    ctx.fillStyle = '#8aa';
    ctx.fillRect(-8, -10, 16, 6);
    ctx.fillStyle = '#aac';
    ctx.fillRect(-4, -12, 8, 2);
    ctx.fillStyle = '#f88';
    ctx.beginPath(); ctx.arc(0, 8, 2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawFoot(f) {
    ctx.save();
    ctx.translate(f.x, f.y);
    if (f.state === 'warn') {
      const p = f.age / f.warnDur;
      const r = f.radius * (0.4 + p * 0.6);
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
      g.addColorStop(0, `rgba(0, 0, 0, ${0.4 + p * 0.3})`);
      g.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
      const hgt = 1 - p;
      ctx.fillStyle = `rgba(0,0,0,${0.4 + p * 0.5})`;
      drawFootShape(0, -hgt * 80, 0.5 + p * 0.5);
    } else if (f.state === 'stomp') {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
      ctx.beginPath(); ctx.arc(0, 0, f.radius * 1.05, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#222';
      drawFootShape(0, 0, 1);
    } else if (f.state === 'lift') {
      const p = f.age / f.liftDur;
      ctx.fillStyle = `rgba(0, 0, 0, ${(1 - p) * 0.7})`;
      ctx.beginPath(); ctx.arc(0, 0, f.radius * (1 - p * 0.3), 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(40, 40, 40, ${1 - p})`;
      drawFootShape(0, -p * 40, 1 - p * 0.2);
    }
    ctx.restore();
  }

  function drawBomb(b) {
    ctx.save();
    ctx.translate(b.x, b.y);
    const glow = Math.sin(performance.now() / 300) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255, 100, 100, ${glow * 0.4})`;
    ctx.beginPath(); ctx.arc(0, 0, b.radius + 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff4444';
    ctx.beginPath(); ctx.arc(0, 0, b.radius, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff6666';
    ctx.beginPath(); ctx.arc(-4, -4, b.radius * 0.6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.fillRect(-2, -b.radius - 4, 4, 4);
    ctx.fillStyle = '#ff8800';
    ctx.beginPath(); ctx.arc(0, -b.radius - 2, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawFootShape(cx, cy, s) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(s, s);
    ctx.beginPath(); ctx.ellipse(0, 10, 38, 50, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, -30, 32, 28, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#444';
    ctx.beginPath(); ctx.ellipse(0, -10, 20, 30, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 4; i++) {
      const y = -22 + i * 10;
      ctx.fillRect(-2, y, 4, 2);
    }
    ctx.restore();
  }

  function drawFoodCrumb(x, y, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.fillStyle = '#a87850';
    ctx.beginPath(); ctx.ellipse(0, 0, 5, 4, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#7a5430';
    ctx.beginPath(); ctx.arc(-2, -1, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, 1, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  function drawFoodCereal(x, y, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = '#e8a040'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = '#c47820'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
  function drawFoodSugar(x, y, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.fillStyle = '#f0f0f0';
    ctx.fillRect(-5, -5, 10, 10);
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1;
    ctx.strokeRect(-5, -5, 10, 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-4, -4, 4, 4);
    ctx.restore();
  }
  function drawFoodCandy(x, y, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.fillStyle = '#e02858';
    ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-1.5, -1.5, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#a01838';
    ctx.beginPath(); ctx.arc(2, 2, 1, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  function drawFoodCookie(x, y, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.fillStyle = '#b48050';
    ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a2010';
    ctx.beginPath(); ctx.arc(-2, -1, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, 1, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, 2, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, -2, 1, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawCargo(x, y, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale || 1, scale || 1);
    ctx.fillStyle = '#8a6a4a';
    ctx.fillRect(-7, -7, 14, 14);
    ctx.strokeStyle = '#5a4a2a';
    ctx.lineWidth = 1;
    ctx.strokeRect(-7, -7, 14, 14);
    ctx.strokeStyle = '#6a5a3a';
    ctx.beginPath(); ctx.moveTo(-7, 0); ctx.lineTo(7, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(0, 7); ctx.stroke();
    ctx.restore();
  }

  // ============ LIFECYCLE ============
  let lastTime = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    if (mode && running) {
      update(dt);
      draw();
    }
    requestAnimationFrame(loop);
  }

  function startGame(modeKey) {
    mode = modeKey;
    const M = MODES[mode];
    document.documentElement.style.setProperty('--accent', M.accent);
    document.getElementById('earnLabel').textContent = M.earnLabel;
    document.getElementById('fareLabel').textContent = M.fareLabel;
    document.getElementById('livesRow').style.display = M.hasLives ? 'flex' : 'none';
    money = 0; fares = 0; lives = M.lives;
    timeLeft = M.duration;
    passenger = null; hazards = []; hazardTimer = 3.5; shake = 0; invuln = 0;
    if (mode === 'taxi') world = buildCityWorld();
    else if (mode === 'ant') world = buildHouseWorld();
    else if (mode === 'plane') world = buildSkyWorld();
    else world = buildOceanWorld();
    player = createPlayer(mode);
    player.x = world.spawn.x; player.y = world.spawn.y;
    player.angle = world.spawn.angle;
    if (mode === 'plane') player.speed = player.cruise;
    cam.x = player.x; cam.y = player.y;
    spawnPickup();
    running = true;
    document.getElementById('overlay').classList.add('hidden');
  }

  function endGame() {
    running = false;
    const M = MODES[mode];
    const tier = money > 100 ? 'good' : money > 40 ? 'mid' : 'bad';
    const reason = (mode === 'ant' && lives <= 0) ? 'STOMPED FLAT' : 'SHIFT OVER';
    const earned = `${M.earnPrefix}${money}`;
    let unit = 'deliveries';
    if (mode === 'taxi') unit = `fare${fares===1?'':'s'}`;
    else if (mode === 'plane') unit = `flight${fares===1?'':'s'}`;
    else unit = `deliver${fares===1?'y':'ies'}`;
    const overlay = document.getElementById('overlay');
    overlay.innerHTML = `
      <h1>${reason}</h1>
      <p>You earned <span style="color:${M.accent};font-weight:700">${earned}</span> from ${fares} ${unit}.</p>
      <p>${M.gameOver[tier]}</p>
      <div class="end-buttons">
        <button class="btn-primary" id="againBtn">Drive Again</button>
        <button class="btn-secondary" id="switchBtn">Switch Vehicle</button>
      </div>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('againBtn').addEventListener('click', () => startGame(mode));
    document.getElementById('switchBtn').addEventListener('click', showModeSelect);
  }

  function modeCardHTML(modeKey) {
    const M = MODES[modeKey];
    const swatches = COLOR_PALETTE[modeKey].map(c =>
      `<button class="swatch ${c === customization[modeKey] ? 'selected' : ''}" data-color="${c}" style="background:${c}" type="button" aria-label="${c}"></button>`
    ).join('');
    return `
      <div class="mode-card" data-mode="${modeKey}" style="--mc-color:${M.accent};">
        <span class="emoji">${M.emoji}</span>
        <h2>${M.title}</h2>
        <p>${M.blurb}</p>
        <div class="color-row">${swatches}</div>
        <button class="drive-btn" type="button">Drive &rarr;</button>
      </div>`;
  }

  function showModeSelect() {
    running = false;
    mode = null;
    const overlay = document.getElementById('overlay');
    overlay.innerHTML = `
      <h1>DRIVE ANYTHING</h1>
      <p>Pick something to drive. Customize the paint, then go.</p>
      <div class="modes">
        ${modeCardHTML('taxi')}
        ${modeCardHTML('ant')}
        ${modeCardHTML('plane')}
        ${modeCardHTML('ship')}
      </div>
    `;
    overlay.classList.remove('hidden');
    attachModeHandlers();
    updateStatus();
  }

  function attachModeHandlers() {
    document.querySelectorAll('.mode-card').forEach(card => {
      const modeKey = card.dataset.mode;
      card.querySelectorAll('.swatch').forEach(sw => {
        sw.addEventListener('click', (e) => {
          e.stopPropagation();
          customization[modeKey] = sw.dataset.color;
          saveCustomization();
          card.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
          sw.classList.add('selected');
        });
      });
      const driveBtn = card.querySelector('.drive-btn');
      if (driveBtn) driveBtn.addEventListener('click', () => startGame(modeKey));
    });
  }

  showModeSelect();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
